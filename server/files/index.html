<!DOCTYPE html>http://localhost:3000/
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
        body {
            font-family: 'Franklin Gothic Medium', 'Arial', sans-serif;
            background-color: #635b5b;
            margin: 50px;
        }

        h1 {
            font-weight: bold;
            margin: 20px;
        }

        .movie {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.61);
            margin-bottom: 40px;
            padding: 20px;
        }
        .movie img {
            border-radius: 15px;
        }

        .genre {
            display: inline-block;
            background-color: #e9c372;
            border-radius: 5px;
            padding: 5px 10px;
            margin: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .genre:hover {
            background-color: #d4a64f;
            transform: scale(1.1);
        }


        
        
    </style>
    <script src="index.js"></script>

</head>

<body>
</body>

</html>
